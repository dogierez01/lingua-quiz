    function shuffleArray(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];

    function startQuiz() {
        score = 0;
        incorrectCount = 0;
        currentQuestionIndex = 0;
        updateTallyDisplay();

        currentQuizData = shuffleArray(originalQuizData);

        welcomeScreen.style.display = 'none';
        resultBox.style.display = 'none';
        quizBox.style.display = 'block';

        loadQuestion();
    }

    function loadQuestion() {
        nextBtn.style.display = "none";
        optionsContainer.innerHTML = "";
        
        const currentData = currentQuizData[currentQuestionIndex];
        progressText.textContent = `Question ${currentQuestionIndex + 1} of ${currentQuizData.length}`;
        questionText.textContent = currentData.q;

        const correctAnswerText = currentData.options[currentData.answer];
        let shuffledOptions = shuffleArray(currentData.options);

        shuffledOptions.forEach((option, index) => {
            const button = document.createElement("button");
            button.className = "option-btn";
            button.id = "btn-" + index;
            button.textContent = option;
            
            const isCorrect = (option === correctAnswerText);
            
            button.onclick = () => selectAnswer(isCorrect, index, shuffledOptions.indexOf(correctAnswerText), button);
            optionsContainer.appendChild(button);
        });
    }

    function selectAnswer(isCorrect, selectedIndex, newCorrectIndex, selectedButton) {
        const allButtons = document.querySelectorAll(".option-btn");
        allButtons.forEach(btn => btn.disabled = true);

        if (isCorrect) {
            selectedButton.classList.add("correct");
            score++;
        } else {
            selectedButton.classList.add("incorrect");
            incorrectCount++;
            document.getElementById("btn-" + newCorrectIndex).classList.add("missed-correct");
        }

        updateTallyDisplay();
        nextBtn.style.display = "block";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentQuizData.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        quizBox.style.display = "none";
        resultBox.style.display = "block";
        scoreText.textContent = `You scored ${score} out of ${currentQuizData.length}!`;
    }
</script>

</body>
</html>
